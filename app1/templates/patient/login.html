{% extends "Patient/nav.html" %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Login</title>
<link rel="stylesheet" href={% static "CSS/patient/login.css" %}>

       
     {% if msg %}
    <script>
      alert("{{msg}}")
    </script>
    {% endif %}

</head>

<body>

<div class="container">

<h2>Patient Login</h2>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" minlength="8" required>
</div>

<div class="form-group">
<button type="submit">Login</button>
</div>


<div>
  <h3>You Not Register First Click on  <a href="{% url 'register' %}">Registration</a> </h3>
</div>

<div>
 <h3>forgot your password  <a href="{% url 'forgot_password' %}">Forgot Password?</a></h3>
</div>


<div>
 <h3>change your password  <a href="{% url 'change_password' %}">change Password?</a></h3>
</div>

</form>
</div>

</body>
</html>
{% endblock content %}
