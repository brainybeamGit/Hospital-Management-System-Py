{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>
<link rel="stylesheet" href={% static "CSS/patient/verify_otp.css" %}>

  {% if msg %}
    <script>
      alert("{{msg}}")
    </script>
    {% endif %}


</head>

<body>

<div class="box">

<h2>Enter OTP</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="otp" placeholder="Enter OTP">

<button type="submit">Verify</button>

</form>

<p style="color:red">{{msg}}</p>

</div>

</body>
</html>
