{% extends "Patient/nav.html" %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<link rel="stylesheet" href={% static "CSS/patient/registration.css" %}>

{% if registered %}
    <script>
      alert("{{registered}}")
    </script>
    {% endif %}
    
{% if registeredsuccess %}
    <script>
      alert("{{registeredsuccess}}")
    </script>
    {% endif %}

</head>

<body>

<div class="container">

<h2>Paitent Registration</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input type="text" name="first_name" required>
</div>

<div class="form-group">
<label>Middle Name</label>
<input type="text" name="middle_name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="last_name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Mobile</label>
<input type="text" name="mobile" maxlength="10" pattern="[0-9]{10}" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password"  minlength="8" pattern=".{8,}" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="form-group">
<label>Marital Status</label>
<select name="marital_status" required>
<option>Single</option>
<option>Married</option>
</select>
</div>

<div class="form-group">
<label>Blood Group</label>
<select name="bloodgroup" required>
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
<option>A-</option>
<option>B-</option>
<option>O-</option>
<option>AB-</option>
<option>NONE</option>
</select>
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city" required>
</div>

<div class="form-group">
<label>Pincode</label>
<input type="text" name="pincode" required>
</div>

<div class="form-group full">
<label>Address</label>
<textarea name="add" required></textarea>
</div>

<div class="form-group full">
<label>Profile Photo</label>
<input type="file" name="photo" required>
</div>

<div class="form-group full">
<button type="submit">Register</button>
</div>

<div class="form-group full">
  <h3>Already Registered Click -> <a href="{% url 'login' %}">Login</a> </h3>

</div>

</div>
</form>
</div>

</body>
</html>

{% endblock content %}
