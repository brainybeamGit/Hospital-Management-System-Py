{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>
<link rel="stylesheet" href={% static "CSS/patient/otp.css" %}>

<style>


</style>
{% if sucess %}
<script>
alert("{{sucess}}")
{% endif %}

{% if msg %}
<script>
alert("{{msg}}")
</script>
{% endif %}

</head>

<body>

<div class="container">

<h2>Verify OTP</h2>

<form method="POST" action="{% url 'verify_otp' %}">
{% csrf_token %}

<div class="form-group">
<label>Enter OTP</label>
<input type="text" name="otp" maxlength="6" pattern="[0-9]{6}" required>
</div>

<div class="form-group">
<button type="submit">Verify OTP</button>
</div>

</form>

</div>

</body>
</html>
