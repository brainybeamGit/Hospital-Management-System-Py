
{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<link rel="stylesheet" href={% static "CSS/patient/forgot_password.css" %}>

  {% if msg %}
    <script>
      alert("{{msg}}")
    </script>
    {% endif %}

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<form method="POST">
{% csrf_token %}

<input type="email" name="email" placeholder="Enter Email" required>

<button type="submit">Send OTP</button>

</form>

<p style="color:red">{{msg}}</p>

</div>

</body>
</html>
